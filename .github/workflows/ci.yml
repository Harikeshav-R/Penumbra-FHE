name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust runtime (fmt, clippy, test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: runtime
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: runtime

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy (warnings as errors)
        run: cargo clippy --all-targets --all-features -- -D warnings

      # FHE is dramatically faster in release; debug test runs are impractically slow.
      - name: Test (release)
        run: cargo test --release --all-features

  python:
    name: Python front end (ruff, black, pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      # Core deps + dev tools only. The heavy `ml` extra (torch/brevitas) isn't
      # exercised in Phase 0; add a dedicated job once it is.
      - name: Sync dependencies
        run: uv sync --dev

      # Lint/format the package and the top-level `tests/` tree (part of the suite).
      # `--config` is explicit so the package and the out-of-tree `tests/` dir use the
      # same settings — otherwise config discovery for `../tests` falls back to defaults.
      - name: Ruff
        run: uv run ruff check --config pyproject.toml . ../tests

      - name: Black (check)
        run: uv run black --check --config pyproject.toml . ../tests

      - name: Pytest
        run: uv run pytest
