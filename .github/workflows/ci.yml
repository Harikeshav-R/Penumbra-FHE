name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  RUSTFLAGS: "-D warnings"
  CARGO_TERM_COLOR: "always"

permissions:
  contents: read

jobs:
  rust-fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.1.5 # v4
      - run: rustup toolchain install stable --profile minimal --component rustfmt
      - run: cargo fmt --all -- --check

  rust-clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.1.5 # v4
      - run: rustup toolchain install stable --profile minimal --component clippy
      - uses: Swatinem/rust-cache@v2.7.3 # v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  rust-test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4.1.5 # v4
      - run: rustup toolchain install stable --profile minimal
      - run: rustup target add x86_64-pc-windows-msvc
        if: runner.os == 'Windows'
      - uses: Swatinem/rust-cache@v2.7.3 # v2
      - run: cargo test --workspace

  python-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.1.5 # v4
      - uses: actions/setup-python@v6.2.0 # v5
        with:
          python-version: "3.12"
      - run: pip install ruff pyrefly
      - run: ruff check .
      - run: ruff format --check .
      - run: pyrefly check python/

  python-test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4.1.5 # v4
      - uses: actions/setup-python@v6.2.0 # v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: pip install maturin
      - run: maturin develop --release
      - run: pip install pytest pytest-benchmark
      - run: pytest tests/

  docs-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.1.5 # v4
      - uses: actions/setup-python@v6.2.0 # v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: rustup toolchain install stable --profile minimal
      - run: pip install -e ".[docs]"
      - run: make -C docs html
      - run: cargo doc --workspace --no-deps
      - uses: actions/upload-artifact@v7.0.1 # v4
        with:
          name: docs
          path: docs/_build/html

  commitlint:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4.1.5 # v4
        with:
          fetch-depth: 0
      - uses: wagoid/commitlint-github-action@v6.2.1 # v6

  required-checks:
    needs: [rust-fmt, rust-clippy, rust-test, python-lint, python-test, docs-build, commitlint]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Ensure all dependencies passed
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1
      - run: exit 0
