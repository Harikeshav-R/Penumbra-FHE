name: Docs

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.1.5 # v4
      - uses: actions/setup-python@v6.2.0 # v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: rustup toolchain install stable --profile minimal
      - run: pip install maturin
      - run: pip install -e ".[docs]"
      - run: cargo doc --workspace --no-deps --document-private-items
      - run: mkdir -p docs/_build/html/rustdoc/
      - run: mv target/doc/* docs/_build/html/rustdoc/
      - run: make -C docs html
      - uses: actions/upload-pages-artifact@v5.0.0 # v3
        with:
          path: docs/_build/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5.0.0 # v4
