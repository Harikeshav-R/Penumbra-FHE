name: Bug Report
description: Create a report to help us improve Penumbra.
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: "Before filing, check existing issues and search the discussions."
  - type: input
    id: penumbra_version
    attributes:
      label: Penumbra version
      placeholder: "e.g., 0.1.0"
    validations:
      required: true
  - type: input
    id: python_version
    attributes:
      label: Python version
      placeholder: "e.g., 3.12.3"
    validations:
      required: true
  - type: input
    id: rust_version
    attributes:
      label: Rust version
      placeholder: "Output of `rustc --version`"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: OS
      options:
        - Ubuntu
        - macOS
        - Windows x86_64
        - Other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: "A clear and concise description of what the bug is."
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: "How can we reproduce the problem?"
      placeholder: |
        1. ...
        2. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: reproducer
    attributes:
      label: Minimal reproducer
      description: "Please provide a minimal code example that reproduces the issue."
      render: python
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: "Add any other context about the problem here."
    validations:
      required: false
  - type: checkboxes
    id: checks
    attributes:
      label: Acknowledgments
      options:
        - label: I have searched existing issues
          required: true
        - label: I have read CONTRIBUTING.md
          required: true
        - label: I am willing to help fix this
          required: false
